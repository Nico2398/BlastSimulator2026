name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer Chrome
        run: npx puppeteer browsers install chrome

      - name: Run tests with verbose and JUnit reporters
        run: npx vitest run --reporter=verbose --reporter=junit --outputFile=test-results/junit.xml

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs:
      - typecheck
      - test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/

  # Runs every scenario in both command and interaction modes to verify dual-play parity.
  # All scenarios are run sequentially in a single job to avoid the overhead of 198 parallel jobs.
  scenario-dual-play:
    name: "Scenario dual-play (command + interaction)"
    runs-on: ubuntu-latest
    needs:
      - typecheck
      - test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer Chrome
        run: npx puppeteer browsers install chrome

      - name: Build project
        run: npm run build

      - name: Start dev server
        run: |
          npx vite --port 5173 &
          sleep 5
          curl -s http://localhost:5173 > /dev/null || (echo "Dev server failed to start" && exit 1)

      - name: Run all scenarios in both modes
        run: |
          FAILED=0
          SCENARIOS=$(ls scripts/scenario-defs/*.json | xargs -I{} basename {} .json | sort)
          TOTAL=$(echo "$SCENARIOS" | wc -l)
          INDEX=0
          for SCENARIO in $SCENARIOS; do
            INDEX=$((INDEX + 1))
            for MODE in command interaction; do
              echo ""
              echo "========================================"
              echo "[$INDEX/$TOTAL] Running: $SCENARIO ($MODE)"
              echo "========================================"
              if ! npx tsx scripts/scenario-test.ts --scenario "$SCENARIO" --mode "$MODE"; then
                echo "FAILED: $SCENARIO ($MODE)"
                FAILED=1
              fi
            done
          done
          echo ""
          echo "========================================"
          if [ "$FAILED" -ne 0 ]; then
            echo "Some scenarios failed. Check logs above."
            exit 1
          fi
          echo "All scenarios passed in both modes."

      - name: Stop dev server
        if: always()
        run: kill $(lsof -t -i:5173) 2>/dev/null || true
