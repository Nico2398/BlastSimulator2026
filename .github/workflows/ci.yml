name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer Chrome
        run: npx puppeteer browsers install chrome

      - name: Run tests with verbose and JUnit reporters
        run: npx vitest run --reporter=verbose --reporter=junit --outputFile=test-results/junit.xml

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs:
      - typecheck
      - test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/

  # Runs every scenario in both command and interaction modes to verify dual-play parity.
  scenario-dual-play:
    name: "Scenario dual-play: ${{ matrix.scenario }} (${{ matrix.mode }})"
    runs-on: ubuntu-latest
    needs:
      - typecheck
      - test
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - blast-basic
          - blast-charge-loading-ui
          - blast-detonation-sequence-ui
          - blast-drill-plan-ui
          - blast-execution-effects
          - blast-preview-software-tiers
          - blast-report-metrics
          - blast-voxel-fragmentation
          - building-lifecycle
          - collapse-recovery
          - contract-negotiation
          - employee-skills-visual
          - employee-training
          - level1-lose-arrest
          - level1-lose-bankruptcy
          - level1-lose-ecology
          - level1-lose-revolt
          - level1-playthrough-revolt
          - level1-playthrough-win
          - level1-win-conservative
          - level1-win-efficient
          - level2-playthrough-bankruptcy
          - level2-playthrough-win
          - level3-playthrough-ecology
          - level3-playthrough-win
          - multi-deck-blast
          - needs-cycle
          - presplit-wall
          - ramp-navigation
          - skill-progression
          - survey-confidence-display
          - survey-confidence-overlay
          - survey-execution
          - survey-method-selection
          - survey-ore-vein-visibility
          - survey-overlay-lifecycle
          - survey-post-blast-ore-report
          - survey-result-visualization
          - survey-seismic-side-effects
          - survey-stale-handling
          - survey-then-blast
          - survey-then-blast-playthrough
          - tutorial-playthrough
          - vehicle-traffic
          - vibration-budget
          - weather-flood
        mode:
          - command
          - interaction
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer Chrome
        run: npx puppeteer browsers install chrome

      - name: Build project
        run: npm run build

      - name: Start dev server
        run: |
          npx vite --port 5173 &
          sleep 5
          curl -s http://localhost:5173 > /dev/null || (echo "Dev server failed to start" && exit 1)

      - name: Run scenario test (${{ matrix.mode }} mode)
        run: npx tsx scripts/scenario-test.ts --scenario ${{ matrix.scenario }} --mode ${{ matrix.mode }}

      - name: Stop dev server
        if: always()
        run: kill $(lsof -t -i:5173) 2>/dev/null || true
