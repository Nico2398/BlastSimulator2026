name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer Chrome
        run: npx puppeteer browsers install chrome

      - name: Run tests with verbose and JUnit reporters
        run: npx vitest run --reporter=verbose --reporter=junit --outputFile=test-results/junit.xml

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs:
      - typecheck
      - test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/

  # Runs every scenario in both command and interaction modes to verify dual-play parity.
  scenario-dual-play:
    name: "Scenario dual-play: ${{ matrix.scenario }} (${{ matrix.mode }})"
    runs-on: ubuntu-latest
    needs:
      - typecheck
      - test
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - blast-basic
          - blast-charge-loading-ui
          - blast-charge-sequence-visual
          - blast-detonation-sequence-ui
          - blast-drill-plan-ui
          - blast-drill-plan-visual
          - blast-execution-effects
          - blast-execution-visual
          - blast-overcharge
          - blast-preview-software-tiers
          - blast-preview-tiers-visual
          - blast-report-metrics
          - blast-report-visual
          - blast-undercharge
          - blast-visual-full
          - blast-voxel-fragmentation
          - blast-voxel-fragmentation-visual
          - building-destruction-visual
          - building-lifecycle
          - building-living-visual
          - building-menu-visual
          - building-placement-visual
          - building-ramp-visual
          - building-research-visual
          - building-tier-system-visual
          - building-training-visual
          - building-vehicle-depot-visual
          - building-warehouse-visual
          - collapse-recovery
          - contract-negotiation
          - contract-panel-visual
          - core-loop-visual
          - economy-display-visual
          - employee-skills-visual
          - employee-training
          - event-dialog-visual
          - i18n-display-visual
          - level1-lose-arrest
          - level1-lose-bankruptcy
          - level1-lose-ecology
          - level1-lose-revolt
          - level1-playthrough-revolt
          - level1-playthrough-win
          - level1-win-conservative
          - level1-win-efficient
          - level2-playthrough-bankruptcy
          - level2-playthrough-win
          - level3-playthrough-ecology
          - level3-playthrough-win
          - main-menu-visual
          - multi-deck-blast
          - nav-cell-types-visual
          - nav-dynamic-updates-visual
          - nav-minimap-integration-visual
          - nav-move-costs-visual
          - nav-path-following-visual
          - nav-pathfinding-visual
          - nav-ramp-routing-visual
          - needs-collapse-visual
          - needs-cost-visual
          - needs-cycle
          - needs-drain-visual
          - needs-gauges-visual
          - needs-morale-visual
          - needs-proactive-queue-visual
          - needs-replenishment-visual
          - needs-shift-cycle-visual
          - presplit-wall
          - ramp-navigation
          - safety-projection-visual
          - save-load-visual
          - scores-display-visual
          - skill-progression
          - survey-confidence-display
          - survey-confidence-overlay
          - survey-execution
          - survey-method-selection
          - survey-ore-vein-visibility
          - survey-overlay-lifecycle
          - survey-post-blast-ore-report
          - survey-result-visualization
          - survey-seismic-side-effects
          - survey-stale-handling
          - survey-then-blast
          - survey-then-blast-playthrough
          - time-management-visual
          - tutorial-playthrough
          - tutorial-steps-visual
          - vehicle-3d-rendering-visual
          - vehicle-driver-assignment-visual
          - vehicle-purchase-tier-ui-visual
          - vehicle-purchase-visual
          - vehicle-roles-panel-visual
          - vehicle-task-states-visual
          - vehicle-traffic
          - vehicle-traffic-routing-visual
          - vibration-budget
          - weather-display-visual
          - weather-flood
        mode:
          - command
          - interaction
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer Chrome
        run: npx puppeteer browsers install chrome

      - name: Build project
        run: npm run build

      - name: Start dev server
        run: |
          npx vite --port 5173 &
          sleep 5
          curl -s http://localhost:5173 > /dev/null || (echo "Dev server failed to start" && exit 1)

      - name: Run scenario test (${{ matrix.mode }} mode)
        run: npx tsx scripts/scenario-test.ts --scenario ${{ matrix.scenario }} --mode ${{ matrix.mode }}

      - name: Stop dev server
        if: always()
        run: kill $(lsof -t -i:5173) 2>/dev/null || true
