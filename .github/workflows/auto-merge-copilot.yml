name: "Pipeline: auto-approve and merge Copilot PRs"

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: write
  contents: write
  checks: read

jobs:
  auto-approve-and-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-approve and merge if Copilot PR with passing checks
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN_COPILOT_AUTOMATION }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let prNumber;

            // Get PR number from event
            if (context.payload.pull_request) {
              prNumber = context.payload.pull_request.number;
            } else if (context.payload.workflow_run) {
              const prs = context.payload.workflow_run.pull_requests;
              if (!prs || prs.length === 0) return;
              // Only proceed if CI succeeded
              if (context.payload.workflow_run.conclusion !== 'success') {
                console.log(`CI concluded with '${context.payload.workflow_run.conclusion}', skipping.`);
                return;
              }
              prNumber = prs[0].number;
            }

            if (!prNumber) return;

            // Get full PR data
            const { data: pr } = await github.rest.pulls.get({
              owner, repo, pull_number: prNumber
            });

            // Only process Copilot PRs with strong provenance checks
            if (!pr.head.ref.startsWith('copilot/')) {
              console.log('Not a Copilot branch, skipping.');
              return;
            }

            // Reject forked PRs — branch must originate from this repo
            if (pr.head.repo.full_name !== `${owner}/${repo}`) {
              console.log(`PR originates from fork ${pr.head.repo.full_name}, skipping.`);
              return;
            }

            // Verify the PR was authored by the Copilot bot
            const expectedAuthors = ['copilot[bot]', 'github-copilot[bot]'];
            if (!expectedAuthors.includes(pr.user.login)) {
              console.log(`PR author ${pr.user.login} is not Copilot, skipping.`);
              return;
            }

            // Convert draft to ready for review if needed (triggers Copilot reviewer automatically)
            // The if (pr.draft) guard ensures this is safely skipped on subsequent CI passes
            // when the PR is already ready for review after a fix commit
            if (pr.draft) {
              console.log(`PR #${prNumber} is a draft, converting to ready for review...`);
              await github.graphql(`
                mutation($prId: ID!) {
                  markPullRequestReadyForReview(input: { pullRequestId: $prId }) {
                    clientMutationId
                  }
                }
              `, { prId: pr.node_id });
              console.log(`PR #${prNumber} marked as ready for review.`);
              // Return here — the Copilot reviewer will now run and submit a review,
              // which will re-trigger this workflow via pull_request_review: submitted
              return;
            }

            // Only proceed to approve+merge if triggered by an approved review
            if (context.payload.review && context.payload.review.state !== 'approved') {
              console.log(`Review state is '${context.payload.review.state}', not approved. Skipping merge.`);
              return;
            }

            // Auto-approve the PR
            try {
              await github.rest.pulls.createReview({
                owner, repo,
                pull_number: prNumber,
                event: 'APPROVE',
                body: '✅ Auto-approved: all checks passed.'
              });
              console.log(`Approved PR #${prNumber}`);
            } catch (e) {
              console.log(`Approval note: ${e.message}`);
            }

            // Merge the PR
            try {
              await github.rest.pulls.merge({
                owner, repo,
                pull_number: prNumber,
                merge_method: 'squash'
              });
              console.log(`Merged PR #${prNumber}`);
            } catch (e) {
              // If merge requirements not met yet, enable auto-merge
              console.log(`Direct merge failed, enabling auto-merge: ${e.message}`);
              try {
                await github.graphql(`
                  mutation($prId: ID!) {
                    enablePullRequestAutoMerge(input: {
                      pullRequestId: $prId,
                      mergeMethod: SQUASH
                    }) { clientMutationId }
                  }
                `, { prId: pr.node_id });
                console.log(`Auto-merge enabled for PR #${prNumber}`);
              } catch (e2) {
                console.log(`Auto-merge also failed: ${e2.message}`);
              }
            }
