name: "Pipeline: auto-review and merge Copilot PRs"

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  # Re-evaluate once the Copilot agent session ends, closing the deferred-merge loop.
  check_run:
    types: [completed]
  # Most reliable trigger: fires the moment APPROVED is posted as a PR comment.
  issue_comment:
    types: [created]
  # Escape hatch: maintainer can manually re-trigger if the pipeline stalls.
  workflow_dispatch: {}

permissions:
  pull-requests: write
  contents: write
  checks: read

jobs:
  auto-review-and-merge:
    runs-on: ubuntu-latest
    # Run when CI succeeds, when the Copilot SWE agent check run completes (app 1143301),
    # when an issue/PR comment is created (catches APPROVED immediately), or on manual dispatch.
    # Note: env context is not available in job-level if conditions; use github/vars/needs/inputs only.
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'check_run' && (github.event.check_run.app.id == 1143301 || github.event.check_run.name == 'copilot')) ||
      (github.event_name == 'issue_comment' && github.event.action == 'created') ||
      (github.event_name == 'workflow_dispatch')
    steps:
      - name: Check PAT_TOKEN_COPILOT_AUTOMATION is configured
        env:
          TOKEN: ${{ secrets.PAT_TOKEN_COPILOT_AUTOMATION }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::PAT_TOKEN_COPILOT_AUTOMATION secret is not set. Add it in Settings → Secrets → Actions."
            exit 1
          fi
      - name: Auto-review and merge Copilot PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN_COPILOT_AUTOMATION }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const COPILOT_SWE_APP_ID = 1143301;
            const expectedAuthors = ['copilot[bot]', 'github-copilot[bot]', 'Copilot'];
            // Marker used both to build the comment body and to detect it later.
            const REVIEW_REQUEST_MARKER = '@copilot Please review your own changes for this PR:';

            // --- 1. Find the PR ---
            // Source differs depending on which trigger fired.
            let prNumber;
            if (context.eventName === 'workflow_run') {
              const prs = context.payload.workflow_run.pull_requests;
              if (!prs || prs.length === 0) {
                console.log('No PRs associated with this CI run.');
                return;
              }
              prNumber = prs[0].number;
            } else if (context.eventName === 'check_run') {
              // Copilot agent session just ended.
              const prs = context.payload.check_run.pull_requests;
              if (!prs || prs.length === 0) {
                console.log('No PRs associated with this agent check run.');
                return;
              }
              prNumber = prs[0].number;
            } else if (context.eventName === 'issue_comment') {
              // Fast path: fired the moment a comment is created on a PR.
              // Only proceed if the comment is APPROVED from Copilot — everything else is noise.
              const comment = context.payload.comment;
              const issue = context.payload.issue;
              if (!issue.pull_request) {
                console.log('Comment is on an issue, not a PR. Skipping.');
                return;
              }
              if (!expectedAuthors.includes(comment.user?.login || '')) {
                console.log(`Comment by ${comment.user?.login}, not Copilot. Skipping.`);
                return;
              }
              if (!comment.body?.toLowerCase().includes('approved')) {
                console.log('Comment does not contain APPROVED. Skipping.');
                return;
              }
              prNumber = issue.number;
            } else if (context.eventName === 'workflow_dispatch') {
              // Manual trigger: scan all open Copilot PRs and merge the first one ready.
              console.log('Manual dispatch: scanning open Copilot PRs...');
              const { data: openPRs } = await github.rest.pulls.list({
                owner, repo, state: 'open', per_page: 100
              });
              const copilotPRs = openPRs.filter(p =>
                p.head.ref.startsWith('copilot/') &&
                expectedAuthors.includes(p.user.login)
              );
              if (copilotPRs.length === 0) {
                console.log('No open Copilot PRs found.');
                return;
              }
              // Pick the first PR — re-entrant logic below will handle checks + merge.
              prNumber = copilotPRs[0].number;
              console.log(`Found ${copilotPRs.length} open Copilot PR(s). Processing #${prNumber}.`);
            } else {
              console.log(`Unhandled event: ${context.eventName}`);
              return;
            }

            // --- 2. Get full PR data ---
            const { data: pr } = await github.rest.pulls.get({
              owner, repo, pull_number: prNumber
            });

            // --- 3. Security: only process Copilot PRs from this repo ---
            if (!pr.head.ref.startsWith('copilot/')) {
              console.log(`Not a Copilot branch (${pr.head.ref}), skipping.`);
              return;
            }
            if (pr.head.repo.full_name !== `${owner}/${repo}`) {
              console.log(`PR from fork ${pr.head.repo.full_name}, skipping.`);
              return;
            }
            if (!expectedAuthors.includes(pr.user.login)) {
              console.log(`PR author ${pr.user.login} is not Copilot, skipping.`);
              return;
            }
            if (pr.merged || pr.state === 'closed') {
              console.log(`PR #${prNumber} is already merged/closed, skipping.`);
              return;
            }

            // --- 4. Agent-still-running guard (applies to ALL paths, including draft) ---
            // This must run BEFORE posting the review request to avoid triggering a review
            // session while the implementation agent is still in the middle of its work.
            //
            // Option B implementation:
            //   • When the trigger IS the completed Copilot agent check_run the event is
            //     definitive proof the session has ended — skip the guard entirely.
            //   • For every other trigger, scan ALL commits in the PR (not just pr.head.sha)
            //     so that extra commits pushed by the agent during its session never hide
            //     the original check run that was registered on an earlier SHA.
            const activeStatuses = new Set(['queued', 'in_progress', 'waiting', 'requested']);
            const triggerIsAgentDone =
              context.eventName === 'check_run' &&
              context.payload.check_run.app?.id === COPILOT_SWE_APP_ID &&
              context.payload.check_run.status === 'completed';

            if (!triggerIsAgentDone) {
              // Fetch every commit SHA that belongs to this PR.
              const prCommits = await github.paginate(github.rest.pulls.listCommits, {
                owner, repo, pull_number: prNumber, per_page: 100
              });

              let agentFound = false;
              let agentStillRunning = false;

              for (const commit of prCommits) {
                const { data: checksData } = await github.rest.checks.listForRef({
                  owner, repo,
                  ref: commit.sha,
                  app_id: COPILOT_SWE_APP_ID,
                  per_page: 100
                });
                if (checksData.check_runs.length === 0) continue;
                agentFound = true;
                if (checksData.check_runs.some(r => activeStatuses.has(r.status))) {
                  agentStillRunning = true;
                  break;
                }
              }

              if (!agentFound) {
                console.log('No Copilot check runs found on any PR commit — agent has not registered yet. Deferring.');
                return;
              }
              if (agentStillRunning) {
                console.log('Copilot SWE agent still in-progress. Deferring all actions until session ends.');
                return;
              }
            } else {
              console.log('Trigger is the completed Copilot agent check run — agent is definitively done. Guard skipped.');
            }

            // --- 5. If draft, mark ready for review (agent has finished its session) ---
            if (pr.draft) {
              console.log(`PR #${prNumber} is a draft. Agent is done — marking ready for review...`);
              await github.graphql(`
                mutation($prId: ID!) {
                  markPullRequestReadyForReview(input: { pullRequestId: $prId }) {
                    clientMutationId
                  }
                }
              `, { prId: pr.node_id });

              // Post a @copilot self-review request only after the implementation agent has exited.
              const reviewPrompt = [
                REVIEW_REQUEST_MARKER,
                '',
                '1. Verify all acceptance criteria from the linked issue are met',
                '2. Check for architecture violations (core must not import renderer/physics/ui)',
                '3. Ensure no hardcoded numbers in logic (use src/core/config/) ',
                '4. Verify i18n: all user-facing strings use t() with both en.json and fr.json entries',
                '5. Check 300-line limit per file',
                '6. Ensure seeded PRNG usage (no Math.random())',
                '7. Verify all tests pass with `npm run validate`',
                '',
                'If everything looks good, comment "APPROVED". If you find issues, fix them and push.',
              ].join('\n');

              await github.rest.issues.createComment({
                owner, repo,
                issue_number: prNumber,
                body: reviewPrompt
              });

              console.log(`PR #${prNumber} marked ready + self-review requested.`);
              return;
            }

            // --- 6. PR is not draft — check if self-review was requested and completed ---
            // Use paginate to handle PRs with more than 100 comments.
            const allComments = await github.paginate(github.rest.issues.listComments, {
              owner, repo,
              issue_number: prNumber,
              per_page: 100
            });

            const reviewRequestComment = allComments.find(c =>
              c.body?.includes(REVIEW_REQUEST_MARKER)
            );

            if (!reviewRequestComment) {
              console.log('No self-review was requested. This may be a legacy PR. Skipping auto-merge.');
              return;
            }

            // Require an explicit "APPROVED" from a Copilot account after the review request.
            // A non-affirming response ("reviewing…", "found issues") must not trigger merge.
            const agentApproved = allComments.some(c =>
              expectedAuthors.includes(c.user?.login || '') &&
              new Date(c.created_at) > new Date(reviewRequestComment.created_at) &&
              c.body?.toLowerCase().includes('approved')
            );

            if (!agentApproved) {
              console.log('Waiting for Copilot agent to post APPROVED after completing self-review...');
              return;
            }

            // --- 6b. For non-issue_comment triggers, verify CI is green before merging ---
            // The issue_comment path fires immediately on APPROVED; CI may still be running.
            // For CI (workflow_run) and check_run paths, CI has already been evaluated.
            let alreadyApproved = false;
            if (context.eventName === 'issue_comment' || context.eventName === 'workflow_dispatch') {
              const { data: { check_runs: allRuns } } = await github.rest.checks.listForRef({
                owner, repo,
                ref: pr.head.sha,
                per_page: 100
              });
              const ciRuns = allRuns.filter(r => r.app?.id !== COPILOT_SWE_APP_ID);
              const allCIGreen = ciRuns.length > 0 && ciRuns.every(r =>
                r.status === 'completed' &&
                ['success', 'skipped', 'neutral'].includes(r.conclusion || '')
              );
              if (!allCIGreen) {
                console.log('CI not fully green yet. Approving + enabling auto-merge to fire when CI passes.');
                // Approve now so the review requirement is satisfied immediately.
                try {
                  await github.rest.pulls.createReview({
                    owner, repo, pull_number: prNumber,
                    event: 'APPROVE',
                    body: '✅ Auto-approved: agent self-review complete. Auto-merge will fire once all CI checks pass.',
                  });
                  alreadyApproved = true;
                  console.log(`Approved PR #${prNumber}`);
                } catch (e) { console.log(`Approval note: ${e.message}`); }
                // Enable GitHub native auto-merge so the PR merges the moment CI goes green.
                try {
                  await github.graphql(`
                    mutation($prId: ID!) {
                      enablePullRequestAutoMerge(input: {
                        pullRequestId: $prId,
                        mergeMethod: SQUASH
                      }) { clientMutationId }
                    }
                  `, { prId: pr.node_id });
                  console.log(`Auto-merge enabled for PR #${prNumber}. Will merge once CI is green.`);
                } catch (e2) {
                  console.log(`Auto-merge enable failed: ${e2.message}`);
                }
                // Option B: always return here. The workflow_run trigger will re-fire once CI
                // passes and handle the final merge — regardless of whether enablePullRequestAutoMerge
                // succeeded. Falling through would cause a double approval (issue 3).
                return;
              }
            }

            // --- 6c. When triggered by agent session end (check_run), verify CI is still green ---
            if (context.eventName === 'check_run') {
              const { data: { check_runs: allRuns } } = await github.rest.checks.listForRef({
                owner, repo,
                ref: pr.head.sha,
                per_page: 100
              });
              const ciRuns = allRuns.filter(r => r.app?.id !== COPILOT_SWE_APP_ID);
              const allCIGreen = ciRuns.length > 0 && ciRuns.every(r =>
                r.status === 'completed' &&
                ['success', 'skipped', 'neutral'].includes(r.conclusion || '')
              );
              if (!allCIGreen) {
                console.log('CI not fully green yet. Waiting for CI to complete before merging.');
                return;
              }
            }

            console.log(`PR #${prNumber}: self-review complete, CI green, agent exited. Approving and merging.`);

            // --- 7. Approve ---
            // Option A safeguard: skip if already approved in step 6b to avoid double approval.
            if (!alreadyApproved) {
              try {
                await github.rest.pulls.createReview({
                  owner, repo,
                  pull_number: prNumber,
                  event: 'APPROVE',
                  body: '✅ Auto-approved: CI passed + agent self-review complete.'
                });
                console.log(`Approved PR #${prNumber}`);
              } catch (e) {
                console.log(`Approval note: ${e.message}`);
              }
            }

            // --- 8. Merge ---
            try {
              await github.rest.pulls.merge({
                owner, repo,
                pull_number: prNumber,
                merge_method: 'squash'
              });
              console.log(`Merged PR #${prNumber}`);
            } catch (e) {
              // If merge requirements not met yet, enable auto-merge via GraphQL
              console.log(`Direct merge failed, enabling auto-merge: ${e.message}`);
              try {
                await github.graphql(`
                  mutation($prId: ID!) {
                    enablePullRequestAutoMerge(input: {
                      pullRequestId: $prId,
                      mergeMethod: SQUASH
                    }) { clientMutationId }
                  }
                `, { prId: pr.node_id });
                console.log(`Auto-merge enabled for PR #${prNumber}`);
              } catch (e2) {
                console.log(`Auto-merge also failed: ${e2.message}`);
              }
            }
