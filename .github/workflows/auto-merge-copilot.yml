name: "Pipeline: auto-review and merge Copilot PRs"

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  pull-requests: write
  contents: write
  checks: read

jobs:
  auto-review-and-merge:
    runs-on: ubuntu-latest
    # Only run when CI succeeds
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Auto-review and merge Copilot PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN_COPILOT_AUTOMATION }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // --- 1. Find the PR from the workflow run ---
            const prs = context.payload.workflow_run.pull_requests;
            if (!prs || prs.length === 0) {
              console.log('No PRs associated with this CI run.');
              return;
            }
            const prNumber = prs[0].number;

            // --- 2. Get full PR data ---
            const { data: pr } = await github.rest.pulls.get({
              owner, repo, pull_number: prNumber
            });

            // --- 3. Security: only process Copilot PRs from this repo ---
            if (!pr.head.ref.startsWith('copilot/')) {
              console.log(`Not a Copilot branch (${pr.head.ref}), skipping.`);
              return;
            }
            if (pr.head.repo.full_name !== `${owner}/${repo}`) {
              console.log(`PR from fork ${pr.head.repo.full_name}, skipping.`);
              return;
            }
            const expectedAuthors = ['copilot[bot]', 'github-copilot[bot]', 'Copilot'];
            if (!expectedAuthors.includes(pr.user.login)) {
              console.log(`PR author ${pr.user.login} is not Copilot, skipping.`);
              return;
            }
            if (pr.merged || pr.state === 'closed') {
              console.log(`PR #${prNumber} is already merged/closed, skipping.`);
              return;
            }

            // Marker used both to build the comment body and to detect it later.
            // Keeping it as a constant ensures the two stay in sync.
            const REVIEW_REQUEST_MARKER = '@copilot Please review your own changes for this PR:';

            // --- 4. If draft, mark ready for review (first CI pass) ---
            if (pr.draft) {
              console.log(`PR #${prNumber} is a draft. Marking ready for review...`);
              await github.graphql(`
                mutation($prId: ID!) {
                  markPullRequestReadyForReview(input: { pullRequestId: $prId }) {
                    clientMutationId
                  }
                }
              `, { prId: pr.node_id });

              // Post a @copilot self-review request. The coding agent will review
              // and push fixes if needed. This replaces the external Copilot reviewer.
              const reviewPrompt = [
                REVIEW_REQUEST_MARKER,
                '',
                '1. Verify all acceptance criteria from the linked issue are met',
                '2. Check for architecture violations (core must not import renderer/physics/ui)',
                '3. Ensure no hardcoded numbers in logic (use src/core/config/)',
                '4. Verify i18n: all user-facing strings use t() with both en.json and fr.json entries',
                '5. Check 300-line limit per file',
                '6. Ensure seeded PRNG usage (no Math.random())',
                '7. Verify all tests pass with `npm run validate`',
                '',
                'If everything looks good, comment "LGTM". If you find issues, fix them and push.',
              ].join('\n');

              await github.rest.issues.createComment({
                owner, repo,
                issue_number: prNumber,
                body: reviewPrompt
              });

              console.log(`PR #${prNumber} marked ready + self-review requested via @copilot.`);
              return;
            }

            // --- 5. PR is not draft — check if self-review was requested and completed ---
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo,
              issue_number: prNumber,
              per_page: 100
            });

            const reviewRequestComment = comments.find(c =>
              c.body?.includes(REVIEW_REQUEST_MARKER)
            );

            if (!reviewRequestComment) {
              console.log('No self-review was requested. This may be a legacy PR. Skipping auto-merge.');
              return;
            }

            // Check if the agent responded with a comment after the review request
            const agentResponded = comments.some(c =>
              expectedAuthors.includes(c.user?.login || '') &&
              new Date(c.created_at) > new Date(reviewRequestComment.created_at)
            );

            // Check if there are commits pushed after the review request (agent fixed things)
            const { data: commits } = await github.rest.pulls.listCommits({
              owner, repo,
              pull_number: prNumber,
              per_page: 100
            });

            const hasPostReviewCommits = commits.some(c =>
              new Date(c.commit.committer.date) > new Date(reviewRequestComment.created_at)
            );

            if (!agentResponded && !hasPostReviewCommits) {
              console.log('Waiting for Copilot agent to complete self-review...');
              return;
            }

            console.log(`PR #${prNumber}: self-review complete, CI green. Approving and merging.`);

            // --- 6. Approve ---
            try {
              await github.rest.pulls.createReview({
                owner, repo,
                pull_number: prNumber,
                event: 'APPROVE',
                body: '✅ Auto-approved: CI passed + agent self-review complete.'
              });
              console.log(`Approved PR #${prNumber}`);
            } catch (e) {
              console.log(`Approval note: ${e.message}`);
            }

            // --- 7. Merge ---
            try {
              await github.rest.pulls.merge({
                owner, repo,
                pull_number: prNumber,
                merge_method: 'squash'
              });
              console.log(`Merged PR #${prNumber}`);
            } catch (e) {
              // If merge requirements not met yet, enable auto-merge via GraphQL
              console.log(`Direct merge failed, enabling auto-merge: ${e.message}`);
              try {
                await github.graphql(`
                  mutation($prId: ID!) {
                    enablePullRequestAutoMerge(input: {
                      pullRequestId: $prId,
                      mergeMethod: SQUASH
                    }) { clientMutationId }
                  }
                `, { prId: pr.node_id });
                console.log(`Auto-merge enabled for PR #${prNumber}`);
              } catch (e2) {
                console.log(`Auto-merge also failed: ${e2.message}`);
              }
            }
