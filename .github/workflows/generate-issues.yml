name: "Pipeline: generate issues from backlog"

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Number of issues to create (1–50)"
        required: false
        default: "1"
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: generate-issues-from-backlog
  cancel-in-progress: false
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create issues from backlog
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN_COPILOT_AUTOMATION }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const parsedCount = parseInt(context.payload.inputs?.count ?? '1', 10);
            const maxCount = Math.max(1, Math.min(Number.isNaN(parsedCount) ? 1 : parsedCount, 50));

            // --- Load backlog ---
            const backlogPath = path.join(process.env.GITHUB_WORKSPACE, '.github/skills/backlog/backlog.json');
            const tasks = JSON.parse(fs.readFileSync(backlogPath, 'utf8'));

            const doneIds = new Set(tasks.filter(t => t.status === 'done').map(t => t.id));

            // --- Fetch ALL existing issues (open + closed) to avoid duplicates ---
            const existingIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo,
              state: 'all',
              labels: 'agent-task',
              per_page: 100,
            });

            // Map backlog-id → GitHub issue number for dependency references
            const backlogIdToIssueNumber = new Map();
            for (const i of existingIssues) {
              const m = (i.body || '').match(/^backlog-id:\s*(\S+)/m);
              if (m) backlogIdToIssueNumber.set(m[1], i.number);
            }

            const existingBacklogIds = new Set(backlogIdToIssueNumber.keys());

            // Tasks with an existing issue are treated as resolved blockers so
            // their dependents become eligible on the next run.
            for (const id of existingBacklogIds) doneIds.add(id);

            // --- Create up to maxCount issues ---
            // Candidates are recomputed after each creation so that a newly
            // created issue immediately unlocks its dependents within the
            // same run (e.g. creating 3.1 makes 3.2 eligible on the next
            // iteration instead of skipping to 4.1).
            let created = 0;

            while (created < maxCount) {
              const candidates = tasks
                .filter(t =>
                  t.status === 'pending' &&
                  !existingBacklogIds.has(t.id) &&
                  t.blockedBy.every(id => doneIds.has(id))
                )
                .sort((a, b) =>
                  a.chapter - b.chapter ||
                  a.id.localeCompare(b.id, undefined, { numeric: true })
                );

              if (candidates.length === 0) {
                console.log('No pending tasks with resolved blockers found.');
                break;
              }

              const task = candidates[0];

              const dependsOnLines = (task.blockedBy || [])
                .filter(id => backlogIdToIssueNumber.has(id))
                .map(id => `Depends on: #${backlogIdToIssueNumber.get(id)}`);

              const body = [
                `backlog-id: ${task.id}`,
                '',
                `See \`.github/skills/backlog/backlog.json\` (id: \`${task.id}\`) for the full story details, files, test file, and resolved dependencies.`,
                ...(dependsOnLines.length > 0 ? ['', ...dependsOnLines] : []),
                '',
                `## Agent Instructions`,
                `Follow the TDD pipeline:`,
                `1. \`@test-writer\` — write failing tests`,
                `2. \`@implementer\` — minimum code to pass tests`,
                `3. \`@refactorer\` — clean up for clarity`,
                `4. \`@validator\` — run full validation`,
                ``,
                `After opening the PR, include \`Closes #<this issue number>\` in the PR body.`,
              ].join('\n');

              const { data: issue } = await github.rest.issues.create({
                owner, repo,
                title: `[${task.id}] ${task.title}`,
                body,
                labels: ['ready', 'agent-task'],
              });

              console.log(`Created issue #${issue.number}: ${issue.html_url}`);

              // Update tracking state so the next iteration sees this task as
              // resolved and can unlock its dependents.
              backlogIdToIssueNumber.set(task.id, issue.number);
              existingBacklogIds.add(task.id);
              doneIds.add(task.id);

              created++;
            }

            if (created === 0) {
              console.log('All eligible tasks already have issues (open or closed).');
            } else {
              console.log(`Done — created ${created} issue(s).`);
            }
