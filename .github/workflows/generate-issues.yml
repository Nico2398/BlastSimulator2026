name: "Pipeline: generate issues from backlog"

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Number of issues to create (1–5)"
        required: false
        default: "1"
        type: string

permissions: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create issues from backlog
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN_COPILOT_AUTOMATION }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const maxCount = Math.min(parseInt('${{ inputs.count }}', 10) || 1, 5);

            // --- Load backlog ---
            const backlogPath = path.join(process.env.GITHUB_WORKSPACE, '.github/skills/backlog/backlog.json');
            const tasks = JSON.parse(fs.readFileSync(backlogPath, 'utf8'));

            const doneIds = new Set(tasks.filter(t => t.status === 'done').map(t => t.id));

            const candidates = tasks.filter(t =>
              t.status === 'pending' &&
              t.blockedBy.every(id => doneIds.has(id))
            );

            if (candidates.length === 0) {
              console.log('No pending tasks with resolved blockers found.');
              return;
            }

            // --- Fetch existing open issues to avoid duplicates ---
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              per_page: 100,
              labels: 'agent-task'
            });

            const existingBacklogIds = new Set(
              existingIssues
                .map(i => (i.body || '').match(/^backlog-id:\s*(\S+)/m)?.[1])
                .filter(Boolean)
            );

            // --- Create up to maxCount issues ---
            let created = 0;
            for (const task of candidates) {
              if (created >= maxCount) break;

              if (existingBacklogIds.has(task.id)) {
                console.log(`Skipping task ${task.id} — open issue already exists.`);
                continue;
              }

              const fileList = task.files.map(f => `- \`${f}\``).join('\n');
              const testLine = task.testFile ? `- \`${task.testFile}\`` : '_(none)_';
              const depLine  = task.blockedBy.length > 0
                ? task.blockedBy.map(id => `- \`${id}\``).join('\n')
                : '_(none)_';

              const body = [
                `backlog-id: ${task.id}`,
                '',
                `## Task`,
                `Chapter ${task.chapter} — ${task.title}`,
                '',
                `## Files`,
                fileList,
                '',
                `## Test file`,
                testLine,
                '',
                `## Resolved dependencies`,
                depLine,
                '',
                `## Agent Instructions`,
                `Follow the TDD pipeline:`,
                `1. \`@test-writer\` — write failing tests`,
                `2. \`@implementer\` — minimum code to pass tests`,
                `3. \`@refactorer\` — clean up for clarity`,
                `4. \`@validator\` — run full validation`,
                ``,
                `After opening the PR, include \`Closes #<this issue number>\` in the PR body.`,
              ].join('\n');

              const { data: issue } = await github.rest.issues.create({
                owner, repo,
                title: `[${task.id}] ${task.title}`,
                body,
                labels: ['ready', 'agent-task'],
              });

              console.log(`Created issue #${issue.number}: ${issue.html_url}`);
              created++;
            }

            if (created === 0) {
              console.log('All eligible tasks already have open issues.');
            } else {
              console.log(`Done — created ${created} issue(s).`);
            }
