name: "Pipeline: scheduled kickstart"

on:
  workflow_dispatch:  # manual trigger only

permissions: {}

jobs:
  kickstart:
    runs-on: ubuntu-latest
    steps:
      - name: Check PAT_TOKEN_COPILOT_AUTOMATION is configured
        env:
          TOKEN: ${{ secrets.PAT_TOKEN_COPILOT_AUTOMATION }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::PAT_TOKEN_COPILOT_AUTOMATION secret is not set. Add it in Settings → Secrets → Actions."
            exit 1
          fi
      - name: Check for idle ready issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN_COPILOT_AUTOMATION }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Check if any issue is already in-progress
            const { data: inProgress } = await github.rest.issues.listForRepo({
              owner, repo,
              labels: 'in-progress',
              state: 'open',
              per_page: 1
            });

            if (inProgress.length > 0) {
              console.log(`Issue #${inProgress[0].number} already in progress.`);
              return;
            }

            // Find next ready issue (oldest first, respecting dependencies)
            const { data: ready } = await github.rest.issues.listForRepo({
              owner, repo,
              labels: 'ready',
              state: 'open',
              sort: 'created',
              direction: 'asc',
              per_page: 10
            });

            if (ready.length === 0) {
              console.log('No ready issues.');
              return;
            }

            for (const issue of ready) {
              // Check dependencies
              const depMatch = issue.body?.match(/[Dd]epends?\s+on:?\s*#(\d+)/);
              if (depMatch) {
                const dep = await github.rest.issues.get({
                  owner, repo, issue_number: parseInt(depMatch[1])
                });
                if (dep.data.state !== 'closed') {
                  console.log(`#${issue.number}: dependency #${depMatch[1]} not closed, skipping.`);
                  continue;
                }
              }

              console.log(`Kickstarting pipeline with issue #${issue.number}`);

              await github.rest.issues.removeLabel({
                owner, repo,
                issue_number: issue.number,
                name: 'ready'
              }).catch(() => {});
              await github.rest.issues.addLabels({
                owner, repo,
                issue_number: issue.number,
                labels: ['in-progress']
              });

              // Assign Copilot coding agent to the issue
              await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/assignees', {
                owner, repo,
                issue_number: issue.number,
                assignees: ['copilot-swe-agent[bot]'],
                agent_assignment: {
                  target_repo: `${owner}/${repo}`,
                  base_branch: 'main',
                  custom_instructions: '',
                  custom_agent: '',
                  model: ''
                },
                headers: { 'X-GitHub-Api-Version': '2022-11-28' }
              });
              console.log(`Issue #${issue.number} assigned to Copilot coding agent.`);

              return; // Only assign one at a time
            }

            console.log('No assignable ready issues (all have unmet dependencies). Pipeline idle.');
