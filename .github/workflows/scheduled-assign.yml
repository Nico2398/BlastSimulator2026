name: "Pipeline: scheduled kickstart"

on:
  workflow_dispatch:  # manual trigger only

permissions:
  issues: write
  actions: write

jobs:
  kickstart:
    runs-on: ubuntu-latest
    steps:
      - name: Check for idle ready issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Check if any issue is already in-progress
            const { data: inProgress } = await github.rest.issues.listForRepo({
              owner, repo,
              labels: 'in-progress',
              state: 'open',
              per_page: 1
            });

            if (inProgress.length > 0) {
              console.log(`Issue #${inProgress[0].number} already in progress.`);
              return;
            }

            // Find next ready issue (oldest first, respecting dependencies)
            const { data: ready } = await github.rest.issues.listForRepo({
              owner, repo,
              labels: 'ready',
              state: 'open',
              sort: 'created',
              direction: 'asc',
              per_page: 10
            });

            if (ready.length === 0) {
              console.log('No ready issues.');
              return;
            }

            for (const issue of ready) {
              // Check dependencies
              const depMatch = issue.body?.match(/[Dd]epends?\s+on:?\s*#(\d+)/);
              if (depMatch) {
                const dep = await github.rest.issues.get({
                  owner, repo, issue_number: parseInt(depMatch[1])
                });
                if (dep.data.state !== 'closed') {
                  console.log(`#${issue.number}: dependency #${depMatch[1]} not closed, skipping.`);
                  continue;
                }
              }

              console.log(`Kickstarting LangGraph pipeline with issue #${issue.number}`);

              await github.rest.issues.removeLabel({
                owner, repo,
                issue_number: issue.number,
                name: 'ready'
              }).catch(() => {});
              await github.rest.issues.addLabels({
                owner, repo,
                issue_number: issue.number,
                labels: ['in-progress']
              });

              // Acknowledge on the issue
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: issue.number,
                body: `🤖 LangGraph agent picking this up via scheduled kickstart…`
              });

              // Dispatch the LangGraph pipeline workflow
              await github.rest.actions.createWorkflowDispatch({
                owner, repo,
                workflow_id: 'langgraph-agent.yml',
                ref: 'main',
                inputs: {
                  issue_number: String(issue.number),
                  comment_body: 'scheduled kickstart'
                }
              });
              console.log(`LangGraph pipeline dispatched for issue #${issue.number}.`);

              return; // Only start one at a time
            }

            console.log('No assignable ready issues (all have unmet dependencies). Pipeline idle.');
