name: "Pipeline: scheduled kickstart"

on:
  schedule:
    - cron: "0 8,14,20 * * *"  # 3x daily at 8am, 2pm, 8pm UTC
  workflow_dispatch:  # manual trigger button

permissions: {}

jobs:
  kickstart:
    runs-on: ubuntu-latest
    steps:
      - name: Check for idle ready issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN_COPILOT_AUTOMATION }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Check if any issue is already in-progress
            const { data: inProgress } = await github.rest.issues.listForRepo({
              owner, repo,
              labels: 'in-progress',
              state: 'open',
              per_page: 1
            });

            if (inProgress.length > 0) {
              console.log(`Issue #${inProgress[0].number} already in progress.`);
              return;
            }

            // Find next ready issue (oldest first, respecting dependencies)
            const { data: ready } = await github.rest.issues.listForRepo({
              owner, repo,
              labels: 'ready',
              state: 'open',
              sort: 'created',
              direction: 'asc',
              per_page: 10
            });

            if (ready.length === 0) {
              console.log('No ready issues.');
              return;
            }

            for (const issue of ready) {
              // Check dependencies
              const depMatch = issue.body?.match(/[Dd]epends?\s+on:?\s*#(\d+)/);
              if (depMatch) {
                const dep = await github.rest.issues.get({
                  owner, repo, issue_number: parseInt(depMatch[1])
                });
                if (dep.data.state !== 'closed') {
                  console.log(`#${issue.number}: dependency #${depMatch[1]} not closed, skipping.`);
                  continue;
                }
              }

              console.log(`Kickstarting pipeline with issue #${issue.number}`);

              await github.rest.issues.removeLabel({
                owner, repo,
                issue_number: issue.number,
                name: 'ready'
              }).catch(() => {});
              await github.rest.issues.addLabels({
                owner, repo,
                issue_number: issue.number,
                labels: ['in-progress']
              });

              // Trigger Copilot coding agent via comment (addAssignees silently drops
              // the 'copilot' bot user when called via PAT — no issues.assigned event fires)
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: issue.number,
                body: '@copilot Please work on this issue following the TDD pipeline instructions in the issue body.'
              });
              console.log(`Copilot triggered via comment on #${issue.number}`);

              return; // Only assign one at a time
            }

            console.log('No assignable ready issues (all have unmet dependencies). Pipeline idle.');
