name: OpenCode Pipeline

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to resolve'
        required: false
        type: string
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

jobs:
  run:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.comment.user.type != 'Bot' &&
        (
          startsWith(github.event.comment.body, '@opencode ') ||
          contains(github.event.comment.body, ' @opencode ') ||
          endsWith(github.event.comment.body, ' @opencode') ||
          github.event.comment.body == '@opencode' ||
          startsWith(github.event.comment.body, '@OpenCode ') ||
          contains(github.event.comment.body, ' @OpenCode ') ||
          endsWith(github.event.comment.body, ' @OpenCode') ||
          github.event.comment.body == '@OpenCode'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup git auth for push operations
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN_COPILOT_AUTOMATION }}
        run: gh auth setup-git

      - uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN_COPILOT_AUTOMATION }}
          OPENCODE_PERMISSION: '{"external_directory":"allow","doom_loop":"deny"}'
        with:
          mentions: '@opencode'
          prompt: |
            ${{ github.event_name == 'workflow_dispatch' && inputs.issue_number && format('Resolve GitHub issue #{0}. Follow the TDD pipeline: plan, write tests, implement, review, refactor, validate, and open a PR with Closes #{0}.', inputs.issue_number) || 'A user mentioned you in a comment. Read the PR/issue context and answer their question directly. If they ask a question, answer it using @ask. If they request a task, use the pipeline.' }}

      - name: Chain to next issue if resolved without PR
        if: github.event_name == 'workflow_dispatch' && inputs.issue_number
        uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN_COPILOT_AUTOMATION }}
        with:
          github-token: ${{ secrets.PAT_TOKEN_COPILOT_AUTOMATION }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNum = parseInt(context.payload.inputs.issue_number);

            const { data: issue } = await github.rest.issues.get({ owner, repo, issue_number: issueNum });
            if (issue.state !== 'closed') {
              console.log(`Issue #${issueNum} still open — PR expected, skipping chain.`);
              return;
            }

            const { data: events } = await github.rest.issues.listEventsForTimeline({
              owner, repo, issue_number: issueNum, per_page: 100
            });
            if (events.some(e => e.event === 'cross-referenced' && e.source?.issue?.pull_request)) {
              console.log(`Issue #${issueNum} has linked PR — auto-assign workflow handles chaining.`);
              return;
            }

            console.log(`Issue #${issueNum} closed without a PR. Chaining to next ready issue.`);

            const { data: inProgress } = await github.rest.issues.listForRepo({
              owner, repo, labels: 'in-progress', state: 'open', per_page: 10
            });
            for (const stuck of inProgress) {
              if (stuck.number === issueNum) continue;
              const { data: ev } = await github.rest.issues.listEventsForTimeline({
                owner, repo, issue_number: stuck.number, per_page: 100
              });
              if (!ev.some(e => e.event === 'cross-referenced' && e.source?.issue?.pull_request)) {
                console.log(`Issue #${stuck.number} in-progress with no PR — halting chain.`);
                await github.rest.issues.createComment({
                  owner, repo, issue_number: stuck.number,
                  body: '⏸️ Pipeline halted — this issue was marked **in-progress** but no linked PR was created.'
                });
                return;
              }
            }

            const { data: ready } = await github.rest.issues.listForRepo({
              owner, repo, labels: 'ready', state: 'open', sort: 'created', direction: 'asc', per_page: 10
            });
            ready.sort((a, b) => a.number - b.number);
            for (const next of ready) {
              const depMatch = next.body?.match(/[Dd]epends?\s+on:?\s*#(\d+)/);
              if (depMatch) {
                const dep = await github.rest.issues.get({ owner, repo, issue_number: parseInt(depMatch[1]) });
                if (dep.data.state !== 'closed') {
                  console.log(`#${next.number}: dependency #${depMatch[1]} not closed, skipping.`);
                  continue;
                }
              }
              console.log(`Assigning #${next.number} to OpenCode pipeline.`);
              await github.rest.issues.removeLabel({ owner, repo, issue_number: next.number, name: 'ready' }).catch(() => {});
              await github.rest.issues.addLabels({ owner, repo, issue_number: next.number, labels: ['in-progress'] });
              await github.rest.issues.createComment({
                owner, repo, issue_number: next.number,
                body: `⚙️ Auto-assigned from pipeline (issue #${issueNum} was resolved without a PR)`
              });
              await github.rest.actions.createWorkflowDispatch({
                owner, repo, workflow_id: 'opencode-runner.yml', ref: 'main',
                inputs: { issue_number: String(next.number) }
              });
              console.log(`OpenCode pipeline dispatched for issue #${next.number}.`);
              return;
            }
            console.log('No more ready issues. Pipeline idle.');
