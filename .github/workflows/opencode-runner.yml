name: OpenCode Pipeline

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to resolve'
        required: false
        type: string
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

jobs:
  run:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.comment.user.type != 'Bot' &&
        (
          startsWith(github.event.comment.body, '@opencode ') ||
          contains(github.event.comment.body, ' @opencode ') ||
          endsWith(github.event.comment.body, ' @opencode') ||
          github.event.comment.body == '@opencode' ||
          startsWith(github.event.comment.body, '@OpenCode ') ||
          contains(github.event.comment.body, ' @OpenCode ') ||
          endsWith(github.event.comment.body, ' @OpenCode') ||
          github.event.comment.body == '@OpenCode'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup git auth for push operations
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN_COPILOT_AUTOMATION }}
        run: gh auth setup-git

      - name: Install opencode
        shell: bash
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add opencode to PATH
        shell: bash
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Build trigger context prompt
        id: build-prompt
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const event = context.eventName;
            let prompt = '';

            if (event === 'workflow_dispatch') {
              const issueNum = '${{ inputs.issue_number }}';
              if (issueNum) {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: parseInt(issueNum)
                });
                prompt = [
                  'You have been assigned to GitHub Issue #' + issueNum + '.',
                  '',
                  'The issue description is:',
                  '--- BEGIN DESCRIPTION ---',
                  issue.body || '(No description)',
                  '--- END DESCRIPTION ---',
                  '',
                  'Read the full Issue #' + issueNum + ' thread for more context. You have access to tools to read issues from the GitHub repo.'
                ].join('\n');
              } else {
                prompt = 'You have been triggered manually.';
              }
            } else if (event === 'issue_comment') {
              const commentBody = context.payload.comment?.body || '';
              const isPR = !!context.payload.issue?.pull_request;
              const num = context.payload.issue?.number;
              const entityBody = context.payload.issue?.body || '(No description)';
              const type = isPR ? 'Pull Request' : 'Issue';
              const threadType = isPR ? 'pull requests' : 'issues';

              prompt = [
                'You have been mentioned in a comment from ' + type + ' #' + num + '.',
                '',
                'The message that triggered this session was:',
                '--- BEGIN TRIGGER MESSAGE ---',
                commentBody,
                '--- END TRIGGER MESSAGE ---',
                '',
                'The description of this ' + type.toLowerCase() + ' is:',
                '--- BEGIN DESCRIPTION ---',
                entityBody,
                '--- END DESCRIPTION ---',
                '',
                'Read the full ' + type + ' #' + num + ' thread for more context. You have access to tools to read ' + threadType + ' from the GitHub repo.'
              ].join('\n');
            } else if (event === 'pull_request_review_comment') {
              const num = context.payload.pull_request?.number;
              const commentBody = context.payload.comment?.body || '';
              const prBody = context.payload.pull_request?.body || '(No description)';

              prompt = [
                'You have been mentioned in a review comment from Pull Request #' + num + '.',
                '',
                'The message that triggered this session was:',
                '--- BEGIN TRIGGER MESSAGE ---',
                commentBody,
                '--- END TRIGGER MESSAGE ---',
                '',
                'The pull request description is:',
                '--- BEGIN DESCRIPTION ---',
                prBody,
                '--- END DESCRIPTION ---',
                '',
                'Read the full Pull Request #' + num + ' thread for more context. You have access to tools to read pull requests from the GitHub repo.'
              ].join('\n');
            } else {
              prompt = 'A user triggered you. Read the context and respond appropriately.';
            }

            const delimiter = 'PROMPT_EOF_' + Date.now();
            fs.appendFileSync(process.env.GITHUB_ENV, 'PROMPT<<' + delimiter + '\n' + prompt + '\n' + delimiter + '\n', 'utf8');

      - name: Run opencode
        id: opencode
        shell: bash
        run: |
          set +e
          opencode --print-logs --log-level WARN github run 2>&1 | tee /tmp/opencode.log
          EXIT_CODE=$?
          echo "session_id=$(grep -oP 'opencode session \K\S+' /tmp/opencode.log | tail -1)" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN_COPILOT_AUTOMATION }}
          OPENCODE_PERMISSION: '{"external_directory":"allow","doom_loop":"deny"}'
          MODEL: opencode/mimo-v2.5-free
          MENTIONS: '@opencode'

      - name: Export full session
        if: always()
        shell: bash
        run: |
          SESSION_ID="${{ steps.opencode.outputs.session_id }}"
          if [ -n "$SESSION_ID" ]; then
            echo "::group::Full Session Export"
            opencode export "$SESSION_ID" 2>/dev/null || echo "(export unavailable)"
            echo "::endgroup::"
          else
            echo "(no session ID found)"
          fi

      - name: Chain to next issue if resolved without PR
        if: github.event_name == 'workflow_dispatch' && inputs.issue_number
        uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN_COPILOT_AUTOMATION }}
        with:
          github-token: ${{ secrets.PAT_TOKEN_COPILOT_AUTOMATION }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNum = parseInt(context.payload.inputs.issue_number);

            const { data: issue } = await github.rest.issues.get({ owner, repo, issue_number: issueNum });
            if (issue.state !== 'closed') {
              console.log(`Issue #${issueNum} still open — PR expected, skipping chain.`);
              return;
            }

            const { data: events } = await github.rest.issues.listEventsForTimeline({
              owner, repo, issue_number: issueNum, per_page: 100
            });
            if (events.some(e => e.event === 'cross-referenced' && e.source?.issue?.pull_request)) {
              console.log(`Issue #${issueNum} has linked PR — auto-assign workflow handles chaining.`);
              return;
            }

            console.log(`Issue #${issueNum} closed without a PR. Chaining to next ready issue.`);

            const { data: inProgress } = await github.rest.issues.listForRepo({
              owner, repo, labels: 'in-progress', state: 'open', per_page: 10
            });
            for (const stuck of inProgress) {
              if (stuck.number === issueNum) continue;
              const { data: ev } = await github.rest.issues.listEventsForTimeline({
                owner, repo, issue_number: stuck.number, per_page: 100
              });
              if (!ev.some(e => e.event === 'cross-referenced' && e.source?.issue?.pull_request)) {
                console.log(`Issue #${stuck.number} in-progress with no PR — halting chain.`);
                await github.rest.issues.createComment({
                  owner, repo, issue_number: stuck.number,
                  body: '⏸️ Pipeline halted — this issue was marked **in-progress** but no linked PR was created.'
                });
                return;
              }
            }

            const { data: ready } = await github.rest.issues.listForRepo({
              owner, repo, labels: 'ready', state: 'open', sort: 'created', direction: 'asc', per_page: 10
            });
            ready.sort((a, b) => a.number - b.number);
            for (const next of ready) {
              const depMatch = next.body?.match(/[Dd]epends?\s+on:?\s*#(\d+)/);
              if (depMatch) {
                const dep = await github.rest.issues.get({ owner, repo, issue_number: parseInt(depMatch[1]) });
                if (dep.data.state !== 'closed') {
                  console.log(`#${next.number}: dependency #${depMatch[1]} not closed, skipping.`);
                  continue;
                }
              }
              console.log(`Assigning #${next.number} to OpenCode pipeline.`);
              await github.rest.issues.removeLabel({ owner, repo, issue_number: next.number, name: 'ready' }).catch(() => {});
              await github.rest.issues.addLabels({ owner, repo, issue_number: next.number, labels: ['in-progress'] });
              await github.rest.issues.createComment({
                owner, repo, issue_number: next.number,
                body: `⚙️ Auto-assigned from pipeline (issue #${issueNum} was resolved without a PR)`
              });
              await github.rest.actions.createWorkflowDispatch({
                owner, repo, workflow_id: 'opencode-runner.yml', ref: 'main',
                inputs: { issue_number: String(next.number) }
              });
              console.log(`OpenCode pipeline dispatched for issue #${next.number}.`);
              return;
            }
            console.log('No more ready issues. Pipeline idle.');
