name: LangGraph Agent

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue or PR number'
        required: true
        type: string
      comment_body:
        description: 'Trigger instruction or comment'
        required: false
        type: string
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  run-agent:
    name: Run LangGraph Pipeline
    # Trigger when:
    #  - manually dispatched from the Actions tab (workflow_dispatch)
    #  - a comment on an issue or PR contains '@langgraph' (repo owner only)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@langgraph') &&
        github.event.comment.author_association == 'OWNER'
      )
    runs-on: ubuntu-latest

    steps:
      # ── 1. Acknowledge ──────────────────────────────────────────────────────
      - name: Acknowledge request
        uses: actions/github-script@v7
        with:
          script: |
            const isDispatch = context.eventName === 'workflow_dispatch';
            let issueNumber;
            if (isDispatch) {
              issueNumber = parseInt(context.payload.inputs.issue_number.replace(/\D/g, ''), 10);
              if (!issueNumber) { core.setFailed('issue_number must be a valid integer'); return; }
            } else {
              issueNumber = context.payload.comment
                ? context.issue.number
                : (context.payload.issue?.number ?? context.payload.pull_request?.number);
            }
            if (context.payload.comment) {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'eyes'
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: '👀 LangGraph agent picking this up…'
              });
            }

      # ── 2. Checkout repository ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 3. Resolve issue number ──────────────────────────────────────────────
      - name: Resolve issue number
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            const isDispatch = context.eventName === 'workflow_dispatch';
            let issueNumber;
            if (isDispatch) {
              issueNumber = parseInt(context.payload.inputs.issue_number.replace(/\D/g, ''), 10);
            } else {
              issueNumber = context.payload.issue?.number ?? context.payload.pull_request?.number;
            }
            if (!issueNumber || isNaN(issueNumber)) {
              core.setFailed(`Could not resolve issue/PR number (got: ${issueNumber})`);
              return;
            }
            core.setOutput('number', String(issueNumber));

      # ── 4. Python + uv ───────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: .langgraph
        run: |
          pip install uv
          uv sync

      # ── 5. Configure git ─────────────────────────────────────────────────────
      - name: Configure git credentials
        run: |
          git config --global user.email "langgraph-bot@github.com"
          git config --global user.name "LangGraph Bot"
          git config --global \
            url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf \
            "https://github.com/"

      # ── 6. Run LangGraph pipeline ────────────────────────────────────────────
      - name: Run LangGraph pipeline
        working-directory: .langgraph
        env:
          # ── Issue context ─────────────────────────────────────────────────────
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          COMMENT_BODY: >-
            ${{
              github.event_name == 'workflow_dispatch'
              && github.event.inputs.comment_body
              || github.event.comment.body
              || format('@langgraph triggered manually on #{0}', github.event.inputs.issue_number)
            }}

          # ── GitHub ───────────────────────────────────────────────────────────
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENTIC_AUTO_MERGE_ENABLED: ${{ vars.AGENTIC_AUTO_MERGE_ENABLED }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          DEFAULT_REPO_OWNER: ${{ github.repository_owner }}
          DEFAULT_REPO_NAME: ${{ github.event.repository.name }}

          # ── LLM provider ─────────────────────────────────────────────────────
          # Change LLM_MODEL_ID to switch provider — no other files need updating:
          #   deepseek:deepseek-v4-flash   → uses DEEPSEEK_API_KEY
          #   openai:gpt-4o                → uses OPENAI_API_KEY
          #   anthropic:claude-3-7-sonnet  → uses ANTHROPIC_API_KEY
          LLM_MODEL_ID: "deepseek:deepseek-v4-flash"
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          # ── LangSmith tracing (optional) ─────────────────────────────────────
          # Set LANGSMITH_API_KEY in repo secrets to enable tracing automatically.
          LANGCHAIN_TRACING_V2: ${{ secrets.LANGSMITH_API_KEY != '' && 'true' || 'false' }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGCHAIN_PROJECT: "BlastSimulator2026-langgraph"

        run: |
          echo "=== LangGraph Agent run ==="
          echo "Issue   : $ISSUE_NUMBER"
          echo "Repo    : $DEFAULT_REPO_OWNER/$DEFAULT_REPO_NAME"
          echo "Model   : $LLM_MODEL_ID"
          echo "Comment : $COMMENT_BODY"
          echo "==========================="
          uv run python runner.py

      # ── 7. Debug on failure ──────────────────────────────────────────────────
      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== Python environment ==="
          cd .langgraph && uv run python --version
          echo "=== Last 100 lines of runner output would appear above ==="
          echo "=== Check the 'Run LangGraph pipeline' step for the full trace ==="
