name: "Pipeline: assign next issue to LangGraph"

on:
  pull_request:
    types: [closed]

permissions:
  issues: write
  contents: write
  actions: write

jobs:
  chain-next-task:
    if: github.event.pull_request.merged == true && vars.LANGGRAPH_AUTO_ASSIGN_ENABLED != 'false' && github.event.pull_request.user.type == 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Close done issue + assign next ready issue to LangGraph
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prBody = context.payload.pull_request.body || '';

            // --- 1. Find and close the completed issue ---
            const closesMatch = prBody.match(/[Cc]loses?\s+#(\d+)/);
            const issueNum = closesMatch?.[1];

            if (!issueNum) {
              console.log('No explicit close directive found in PR body. Skipping issue close — will still assign next ready issue.');
            }

            const n = issueNum ? parseInt(issueNum) : null;
            if (n) {
              console.log(`Updating labels for issue #${n} (closed by native GitHub auto-close).`);
              await github.rest.issues.addLabels({ owner, repo, issue_number: n, labels: ['done'] }).catch(() => {});
              await github.rest.issues.removeLabel({ owner, repo, issue_number: n, name: 'in-progress' }).catch(() => {});
            }

            // --- 2. Update backlog.json to mark the closed task as done ---
            const closedIssueBody = n
              ? (await github.rest.issues.get({ owner, repo, issue_number: n })).data.body
              : null;
            const backlogIdMatch = closedIssueBody?.match(/^backlog-id:\s*(\S+)/m);
            if (backlogIdMatch) {
              const backlogId = backlogIdMatch[1];
              const prNumber = context.payload.pull_request.number;
              try {
                const { data: fileData } = await github.rest.repos.getContent({
                  owner, repo, path: '.github/skills/backlog/backlog.json'
                });
                const raw = Buffer.from(fileData.content, 'base64').toString('utf8');
                const tasks = JSON.parse(raw);
                const task = tasks.find(t => t.id === backlogId);
                if (task && task.status !== 'done') {
                  task.status = 'done';
                  task.closedInPR = prNumber;
                  const updated = JSON.stringify(tasks, null, 2) + '\n';
                  await github.rest.repos.createOrUpdateFileContents({
                    owner, repo,
                    path: '.github/skills/backlog/backlog.json',
                    message: `chore: mark backlog task ${backlogId} as done [skip ci]`,
                    content: Buffer.from(updated).toString('base64'),
                    sha: fileData.sha,
                    branch: 'main'
                  });
                  console.log(`Backlog task ${backlogId} marked as done (PR #${prNumber}).`);
                } else if (task?.status === 'done') {
                  console.log(`Backlog task ${backlogId} already done.`);
                } else {
                  console.log(`Backlog task ${backlogId} not found in backlog.json.`);
                }
              } catch (e) {
                console.log(`Failed to update backlog.json: ${e.message}`);
              }
            } else {
              console.log('No backlog-id in issue body — skipping backlog update.');
            }

            // --- 2.5 Check for stalled in-progress issues ---
            const { data: inProgress } = await github.rest.issues.listForRepo({
              owner, repo,
              labels: 'in-progress',
              state: 'open',
              per_page: 10
            });

            for (const stuck of inProgress) {
              if (stuck.number === n) continue;

              const { data: events } = await github.rest.issues.listEventsForTimeline({
                owner, repo,
                issue_number: stuck.number,
                per_page: 100
              });

              const hasPR = events.some(e => e.event === 'cross-referenced' && e.source?.issue?.pull_request);
              if (!hasPR) {
                console.log(`Issue #${stuck.number} is in-progress but has no linked PR. Halting chain.`);
                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: stuck.number,
                  body: '⏸️ Pipeline halted — this issue was marked **in-progress** but no linked PR was created. Please diagnose manually, then either close it or remove `in-progress` and add `ready`.'
                });
                return;
              }
            }

            // --- 3. Find next ready issue (oldest first) ---
            const { data: ready } = await github.rest.issues.listForRepo({
              owner, repo,
              labels: 'ready',
              state: 'open',
              sort: 'created',
              direction: 'asc',
              per_page: 10
            });

            ready.sort((a, b) => a.number - b.number);

            for (const issue of ready) {
              // Check dependencies
              const depMatch = issue.body?.match(/[Dd]epends?\s+on:?\s*#(\d+)/);
              if (depMatch) {
                const dep = await github.rest.issues.get({
                  owner, repo, issue_number: parseInt(depMatch[1])
                });
                if (dep.data.state !== 'closed') {
                  console.log(`#${issue.number}: dependency #${depMatch[1]} not closed, skipping.`);
                  continue;
                }
              }

              // Label as in-progress
              console.log(`Assigning #${issue.number} to LangGraph pipeline.`);
              await github.rest.issues.removeLabel({
                owner, repo,
                issue_number: issue.number,
                name: 'ready'
              }).catch(() => {});
              await github.rest.issues.addLabels({
                owner, repo,
                issue_number: issue.number,
                labels: ['in-progress']
              });

              // Dispatch the LangGraph pipeline workflow
              await github.rest.actions.createWorkflowDispatch({
                owner, repo,
                workflow_id: 'langgraph-agent.yml',
                ref: 'main',
                inputs: {
                  issue_number: String(issue.number),
                  comment_body: 'auto-assigned from merged PR'
                }
              });
              console.log(`LangGraph pipeline dispatched for issue #${issue.number}.`);

              return; // Only assign one at a time
            }

            console.log('No more ready issues. Pipeline idle.');
