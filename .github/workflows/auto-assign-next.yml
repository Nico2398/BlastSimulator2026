name: "Pipeline: assign next issue to Copilot"

on:
  pull_request:
    types: [closed]

permissions: {}

jobs:
  chain-next-task:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Check PAT_TOKEN_COPILOT_AUTOMATION is configured
        env:
          TOKEN: ${{ secrets.PAT_TOKEN_COPILOT_AUTOMATION }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::PAT_TOKEN_COPILOT_AUTOMATION secret is not set. Add it in Settings → Secrets → Actions."
            exit 1
          fi
      - name: Close done issue + assign next to Copilot
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN_COPILOT_AUTOMATION }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prBody = context.payload.pull_request.body || '';

            // --- 1. Find and close the completed issue ---
            const closesMatch = prBody.match(/[Cc]loses?\s+#(\d+)/);
            const issueNum = closesMatch?.[1];

            if (!issueNum) {
              console.log('No explicit close directive found in PR body. Exiting without closing or assigning any issue.');
              return;
            }

            const n = parseInt(issueNum);
            console.log(`Updating labels for issue #${n} (closed by native GitHub auto-close).`);

            // Note: we do NOT call issues.update(state:'closed') here.
            // The PR body contains "Closes #N", so GitHub natively closes the issue on merge.
            // Calling the API explicitly was redundant and caused double-close race conditions.
            // This workflow only manages labels and pipeline state (backlog + next assignment).

            // Fetch issue body (needed for backlog-id extraction)
            const { data: closedIssue } = await github.rest.issues.get({ owner, repo, issue_number: n });

            await github.rest.issues.addLabels({ owner, repo, issue_number: n, labels: ['done'] });
            await github.rest.issues.removeLabel({ owner, repo, issue_number: n, name: 'in-progress' }).catch(() => {});

            // --- 2. Update backlog.json to mark the closed task as done ---
            const backlogIdMatch = closedIssue.body?.match(/^backlog-id:\s*(\S+)/m);
            if (backlogIdMatch) {
              const backlogId = backlogIdMatch[1];
              const prNumber = context.payload.pull_request.number;
              try {
                const { data: fileData } = await github.rest.repos.getContent({
                  owner, repo, path: '.github/skills/backlog/backlog.json'
                });
                const raw = Buffer.from(fileData.content, 'base64').toString('utf8');
                const tasks = JSON.parse(raw);
                const task = tasks.find(t => t.id === backlogId);
                if (task && task.status !== 'done') {
                  task.status = 'done';
                  task.closedInPR = prNumber;
                  const updated = JSON.stringify(tasks, null, 2) + '\n';
                  await github.rest.repos.createOrUpdateFileContents({
                    owner, repo,
                    path: '.github/skills/backlog/backlog.json',
                    message: `chore: mark backlog task ${backlogId} as done [skip ci]`,
                    content: Buffer.from(updated).toString('base64'),
                    sha: fileData.sha,
                    branch: 'main'
                  });
                  console.log(`Backlog task ${backlogId} marked as done (PR #${prNumber}).`);
                } else if (task?.status === 'done') {
                  console.log(`Backlog task ${backlogId} already done.`);
                } else {
                  console.log(`Backlog task ${backlogId} not found in backlog.json.`);
                }
              } catch (e) {
                console.log(`Failed to update backlog.json: ${e.message}`);
              }
            } else {
              console.log('No backlog-id in issue body — skipping backlog update.');
            }

            // --- 3. Find next ready issue (oldest first) ---
            const { data: ready } = await github.rest.issues.listForRepo({
              owner, repo,
              labels: 'ready',
              state: 'open',
              sort: 'created',
              direction: 'asc',
              per_page: 10
            });

            ready.sort((a, b) => a.number - b.number);

            for (const issue of ready) {
              // Check dependencies
              const depMatch = issue.body?.match(/[Dd]epends?\s+on:?\s*#(\d+)/);
              if (depMatch) {
                const dep = await github.rest.issues.get({
                  owner, repo, issue_number: parseInt(depMatch[1])
                });
                if (dep.data.state !== 'closed') {
                  console.log(`#${issue.number}: dependency #${depMatch[1]} not closed, skipping.`);
                  continue;
                }
              }

              // Assign to Copilot
              console.log(`Assigning #${issue.number} to Copilot.`);
              await github.rest.issues.removeLabel({
                owner, repo,
                issue_number: issue.number,
                name: 'ready'
              }).catch(() => {});
              await github.rest.issues.addLabels({
                owner, repo,
                issue_number: issue.number,
                labels: ['in-progress']
              });

              // Assign Copilot coding agent to the issue
              await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/assignees', {
                owner, repo,
                issue_number: issue.number,
                assignees: ['copilot-swe-agent[bot]'],
                agent_assignment: {
                  target_repo: `${owner}/${repo}`,
                  base_branch: 'main',
                  custom_instructions: '',
                  custom_agent: '',
                  model: ''
                },
                headers: { 'X-GitHub-Api-Version': '2022-11-28' }
              });
              console.log(`Issue #${issue.number} assigned to Copilot coding agent.`);

              return; // Only assign one at a time
            }

            console.log('No more ready issues. Pipeline idle.');
